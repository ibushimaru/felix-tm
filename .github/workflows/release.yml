name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact: felix-tm-windows
            ext: .exe
          - os: macos-latest
            artifact: felix-tm-macos
            ext: ""
          - os: ubuntu-latest
            artifact: felix-tm-linux
            ext: ""
    runs-on: ${{ matrix.os }}
    name: Build ${{ matrix.artifact }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -e .
          pip install pyinstaller

      - name: Build binary
        run: |
          pyinstaller --onefile --name felix-tm --clean \
            --hidden-import felix_tm.io.tmx \
            --hidden-import felix_tm.io.tsv \
            --hidden-import felix_tm.io.xlsx \
            --hidden-import felix_tm.io.xliff \
            entry.py

      - name: Verify binary
        run: ./dist/felix-tm${{ matrix.ext }} --help
        shell: bash

      - name: Rename artifact
        run: |
          mv dist/felix-tm${{ matrix.ext }} dist/${{ matrix.artifact }}${{ matrix.ext }}
        shell: bash

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}${{ matrix.ext }}

  release:
    needs: build
    runs-on: ubuntu-latest
    name: Create Release

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: List artifacts
        run: find artifacts/ -type f | sort

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/felix-tm-windows/felix-tm-windows.exe
            artifacts/felix-tm-macos/felix-tm-macos
            artifacts/felix-tm-linux/felix-tm-linux
