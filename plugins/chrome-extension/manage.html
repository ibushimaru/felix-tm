<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Felix TM — Manage</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Hiragino Sans', sans-serif;
  font-size: 11px; color: #202124; padding: 8px 10px; background: #fff;
  width: 100%;
}
h3 { font-size: 12px; font-weight: 500; margin-bottom: 6px; color: #1a73e8; }

.header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid #e8eaed;
}
.header h1 { font-size: 13px; font-weight: 600; }
.badge { background: #e8eaed; color: #5f6368; padding: 2px 6px; border-radius: 12px; font-size: 10px; }

.tabs { display: flex; border-bottom: 1px solid #dadce0; margin-bottom: 12px; }
.tab { padding: 6px 10px; cursor: pointer; font-size: 11px; color: #5f6368; border-bottom: 2px solid transparent; }
.tab:hover { color: #202124; }
.tab.active { color: #1a73e8; border-bottom-color: #1a73e8; }
.panel { display: none; }
.panel.active { display: block; }

input, select { width: 100%; padding: 5px 6px; border: 1px solid #dadce0; border-radius: 4px; font-size: 11px; margin-bottom: 6px; }
input:focus { outline: none; border-color: #1a73e8; }
.row { display: flex; gap: 6px; margin-bottom: 8px; }
.row > * { flex: 1; }
.btn { padding: 5px 10px; border-radius: 4px; border: none; cursor: pointer; font-size: 11px; font-weight: 500; }
.btn-primary { background: #1a73e8; color: #fff; width: 100%; }
.btn-primary:hover { background: #1557b0; }
.btn-outline { background: #fff; color: #1a73e8; border: 1px solid #dadce0; }
.btn-outline:hover { background: #f1f3f4; }

.match { background: #f8f9fa; border: 1px solid #e8eaed; border-radius: 6px; padding: 6px 8px; margin-bottom: 4px; transition: all 0.1s; }
.match:hover { border-color: #1a73e8; background: #e8f0fe; }
.match-source { color: #5f6368; font-size: 10px; margin-top: 2px; word-break: break-all; }
.match-target { color: #202124; font-size: 11px; margin-top: 1px; word-break: break-all; }
.empty { text-align: center; color: #9aa0a6; padding: 24px 8px; }
.toast { padding: 5px 8px; border-radius: 4px; font-size: 10px; margin-bottom: 6px; background: #e6f4ea; color: #137333; animation: fadeIn 0.15s; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
hr { margin: 12px 0; border: none; border-top: 1px solid #e8eaed; }
</style>
</head>
<body>

<div class="header">
  <h1>Felix TM — Manage</h1>
  <span class="badge" id="stats-badge">TM: 0</span>
</div>

<div class="tabs">
  <div class="tab active" data-panel="tm" id="tab-tm">TM</div>
  <div class="tab" data-panel="glossary" id="tab-glossary">Glossary</div>
  <div class="tab" data-panel="settings" id="tab-settings">Settings</div>
</div>

<!-- TM (Register + Import + Export + Browse) -->
<div id="tm" class="panel active">
  <h3 id="h-register">Register</h3>
  <input type="text" id="reg-source" placeholder="Source">
  <input type="text" id="reg-target" placeholder="Target">
  <button class="btn btn-primary" style="margin-bottom:8px" id="btn-register" data-i18n="register">Register</button>
  <div id="reg-toast"></div>

  <hr>
  <h3 id="h-build">Import</h3>
  <p style="font-size:12px;color:#5f6368;margin-bottom:8px" id="p-bulk-desc">Select source+target columns in the sheet, copy (Ctrl+C), then click Import.</p>
  <button class="btn btn-primary" style="width:100%;margin-bottom:8px" id="btn-paste-import" data-i18n="pasteImport">Paste from Clipboard</button>
  <div id="paste-preview" style="font-size:11px;color:#5f6368;margin-bottom:8px"></div>
  <div id="bulk-toast"></div>

  <div id="drop-zone" style="border:2px dashed #dadce0;border-radius:8px;padding:20px;text-align:center;color:#9aa0a6;cursor:pointer;margin-bottom:8px">
    <span id="drop-text">Drop TMX/TSV file</span>
    <input type="file" id="file-input" accept=".tmx,.tsv,.txt,.csv" style="display:none">
  </div>
  <div id="import-toast"></div>

  <hr>
  <h3 id="h-browse-tm">Browse TM</h3>
  <input type="text" id="tm-filter" placeholder="Filter..." style="margin-bottom:4px">
  <div id="tm-list" style="max-height:400px;overflow:auto"></div>
  <div style="font-size:11px;color:#9aa0a6;margin-top:4px" id="tm-list-count"></div>

  <hr>
  <h3 id="h-export">Export</h3>
  <button class="btn btn-outline" style="width:100%;margin-bottom:8px" id="btn-export-tm">Export TM as TSV</button>
</div>

<!-- Glossary -->
<div id="glossary" class="panel">
  <h3 id="h-add-term">Add Term</h3>
  <input type="text" id="gloss-term" placeholder="Term (source)">
  <input type="text" id="gloss-trans" placeholder="Translation">
  <button class="btn btn-primary" style="width:100%;margin-bottom:12px" id="btn-add-gloss">Add</button>
  <div id="gloss-toast"></div>

  <hr>
  <h3 id="h-gloss-import">Import</h3>
  <p style="font-size:10px;color:#5f6368;margin-bottom:8px" id="p-gloss-desc">Select term+translation columns, copy (Ctrl+C), then click Import.</p>
  <button class="btn btn-primary" style="width:100%;margin-bottom:8px" id="btn-paste-gloss" data-i18n="pasteImport">Paste from Clipboard</button>

  <hr>
  <h3 id="h-browse-gloss">Browse</h3>
  <div id="gloss-list"></div>

  <hr>
  <button class="btn btn-outline" style="width:100%" id="btn-export-gloss">Export Glossary as TSV</button>
</div>

<!-- Settings -->
<div id="settings" class="panel">
  <h3 id="h-settings">Settings</h3>

  <label style="font-size:10px;color:#5f6368">Language / 言語</label>
  <select id="set-lang" style="margin-bottom:12px">
    <option value="en">English</option>
    <option value="ja">日本語</option>
  </select>

  <label style="font-size:10px;color:#5f6368">Source Column / 原文列</label>
  <input type="text" id="set-source-col" value="A" maxlength="2">

  <label style="font-size:10px;color:#5f6368">Target Column / 訳文列</label>
  <input type="text" id="set-target-col" value="B" maxlength="2">

  <label style="font-size:10px;color:#5f6368">Default Min Score / 最低マッチ率</label>
  <select id="set-min-score">
    <option value="0.5">50%</option>
    <option value="0.6">60%</option>
    <option value="0.7">70%</option>
    <option value="0.8">80%</option>
  </select>

  <label style="font-size:10px;color:#5f6368">Get Shortcut (insert match)</label>
  <input type="text" id="set-shortcut-get" value="Cmd+Shift+J" placeholder="Cmd+Shift+J">

  <label style="font-size:10px;color:#5f6368">Set Shortcut (register to TM)</label>
  <input type="text" id="set-shortcut-set" value="Cmd+Shift+U" placeholder="Cmd+Shift+U">

  <button class="btn btn-primary" style="margin-top:12px" id="btn-save-settings">Save / 保存</button>
  <div id="settings-toast" style="margin-top:8px"></div>

  <hr>
  <h3 style="color:#ea4335" id="h-danger">Danger Zone</h3>
  <button class="btn btn-outline" style="width:100%;margin-bottom:8px;color:#ea4335;border-color:#ea4335" id="btn-clear-tm">Clear TM</button>
  <button class="btn btn-outline" style="width:100%;color:#ea4335;border-color:#ea4335" id="btn-clear-gloss">Clear Glossary</button>
</div>

<script src="felix-engine.js"></script>
<script src="manage.js"></script>
</body>
</html>
