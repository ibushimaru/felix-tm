<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Felix TM — Pick a spreadsheet</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Hiragino Sans', sans-serif;
      margin: 0;
      padding: 24px;
      color: #202124;
      background: #fff;
    }
    h1 { font-size: 16px; font-weight: 600; margin-bottom: 8px; color: #1a73e8; }
    p  { font-size: 13px; color: #5f6368; line-height: 1.5; }
    #status { margin-top: 16px; font-size: 13px; }
    .err { color: #d93025; }
  </style>
</head>
<body>
  <h1>Felix TM</h1>
  <p>Choose the Google Sheet you want Felix TM to access. Felix only sees sheets you pick here — your other Drive files stay invisible.</p>
  <div id="status">Loading Google Picker…</div>
  <script src="https://apis.google.com/js/api.js"></script>
  <script src="picker.js"></script>
</body>
</html>
