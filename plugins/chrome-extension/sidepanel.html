<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Hiragino Sans', sans-serif;
  font-size: 13px; color: #202124; padding: 12px; background: #fff;
  width: 100%; min-width: 280px;
}
h3 { font-size: 14px; font-weight: 500; margin-bottom: 8px; color: #1a73e8; }

.header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid #e8eaed;
}
.header h1 { font-size: 16px; font-weight: 600; }
.badge { background: #e8eaed; color: #5f6368; padding: 2px 8px; border-radius: 12px; font-size: 11px; }
.live-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: #34a853; margin-right: 6px; animation: pulse 2s infinite; }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

.tabs { display: flex; border-bottom: 1px solid #dadce0; margin-bottom: 12px; }
.tab { padding: 8px 12px; cursor: pointer; font-size: 12px; color: #5f6368; border-bottom: 2px solid transparent; }
.tab:hover { color: #202124; }
.tab.active { color: #1a73e8; border-bottom-color: #1a73e8; }
.panel { display: none; }
.panel.active { display: block; }

input, select { width: 100%; padding: 8px; border: 1px solid #dadce0; border-radius: 4px; font-size: 13px; margin-bottom: 8px; }
input:focus { outline: none; border-color: #1a73e8; }
.row { display: flex; gap: 6px; margin-bottom: 8px; }
.row > * { flex: 1; }
.btn { padding: 8px 16px; border-radius: 4px; border: none; cursor: pointer; font-size: 13px; font-weight: 500; }
.btn-primary { background: #1a73e8; color: #fff; width: 100%; }
.btn-primary:hover { background: #1557b0; }
.btn-outline { background: #fff; color: #1a73e8; border: 1px solid #dadce0; }
.btn-outline:hover { background: #f1f3f4; }

.match { background: #f8f9fa; border: 1px solid #e8eaed; border-radius: 8px; padding: 10px; margin-bottom: 6px; cursor: pointer; transition: all 0.1s; }
.match:hover { border-color: #1a73e8; background: #e8f0fe; }
.match.inserted { border-color: #34a853; opacity: 0.6; }
.score { display: inline-block; padding: 2px 6px; border-radius: 3px; font-size: 11px; font-weight: 600; color: #fff; }
.score-high { background: #34a853; }
.score-mid { background: #f9ab00; }
.score-low { background: #ea4335; }
.match-source { color: #5f6368; font-size: 12px; margin-top: 4px; word-break: break-all; }
.match-target { color: #202124; font-size: 13px; margin-top: 2px; word-break: break-all; }
.match-meta { color: #9aa0a6; font-size: 11px; margin-top: 4px; }
.empty { text-align: center; color: #9aa0a6; padding: 24px 8px; }
.toast { padding: 8px; border-radius: 4px; font-size: 12px; margin-bottom: 8px; background: #e6f4ea; color: #137333; animation: fadeIn 0.15s; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
hr { margin: 12px 0; border: none; border-top: 1px solid #e8eaed; }
.cell-preview { background: #f1f3f4; border-radius: 4px; padding: 6px 10px; font-size: 12px; color: #3c4043; margin-bottom: 8px; min-height: 20px; word-break: break-all; }
.cell-label { font-size: 11px; color: #9aa0a6; margin-bottom: 2px; }
</style>
</head>
<body>

<div class="header">
  <h1>Felix TM</h1>
  <span class="badge" id="stats-badge"><span class="live-dot"></span>TM: 0</span>
</div>

<!-- Live cell preview -->
<div class="cell-label"><span id="lbl-active-cell">Active Cell</span> <span id="cell-ref"></span></div>
<div class="cell-preview" id="cell-value">—</div>

<div class="tabs">
  <div class="tab active" data-panel="search" id="tab-search">Search</div>
  <div class="tab" data-panel="tm" id="tab-tm">TM</div>
  <div class="tab" data-panel="glossary" id="tab-glossary">Glossary</div>
  <div class="tab" data-panel="settings">⚙</div>
</div>

<!-- Search -->
<div id="search" class="panel active">
  <div class="row">
    <select id="min-score">
      <option value="0.5">50%</option>
      <option value="0.6">60%</option>
      <option value="0.7" selected>70%</option>
      <option value="0.8">80%</option>
      <option value="0.9">90%</option>
    </select>
    <select id="search-type">
      <option value="fuzzy">Fuzzy</option>
      <option value="glossary">Glossary</option>
    </select>
  </div>
  <div id="results"><div class="empty" id="empty-search">Select a cell to auto-search</div></div>
  <div style="margin-top:8px;padding-top:8px;border-top:1px solid #e8eaed">
    <button class="btn btn-outline" style="width:100%" id="btn-set-tm">Set (register to TM) — ⌘⇧S</button>
  </div>
</div>

<!-- TM (Register + Import + Export) -->
<div id="tm" class="panel">
  <h3 id="h-register">Register</h3>
  <input type="text" id="reg-source" placeholder="Source">
  <input type="text" id="reg-target" placeholder="Target">
  <button class="btn btn-primary" style="margin-bottom:8px" id="btn-register">Register</button>
  <div id="reg-toast"></div>

  <hr>
  <h3 id="h-build">Import</h3>
  <p style="font-size:12px;color:#5f6368;margin-bottom:8px" id="p-bulk-desc">Select source+target columns in the sheet, copy (Ctrl+C), then click Import.</p>
  <button class="btn btn-primary" style="width:100%;margin-bottom:8px" id="btn-paste-import">Paste from Clipboard</button>
  <div id="paste-preview" style="font-size:11px;color:#5f6368;margin-bottom:8px"></div>
  <div id="bulk-toast"></div>

  <div id="drop-zone" style="border:2px dashed #dadce0;border-radius:8px;padding:20px;text-align:center;color:#9aa0a6;cursor:pointer;margin-bottom:8px">
    <span id="drop-text">Drop TMX/TSV file</span>
    <input type="file" id="file-input" accept=".tmx,.tsv,.txt,.csv" style="display:none">
  </div>
  <div id="import-toast"></div>

  <hr>
  <h3 id="h-export">Export</h3>
  <button class="btn btn-outline" style="width:100%;margin-bottom:8px" id="btn-export-tm">Export TM as TSV</button>
</div>

<!-- Glossary -->
<div id="glossary" class="panel">
  <h3 id="h-add-term">Add Term</h3>
  <input type="text" id="gloss-term" placeholder="Term (source)">
  <input type="text" id="gloss-trans" placeholder="Translation">
  <button class="btn btn-primary" style="width:100%;margin-bottom:12px" id="btn-add-gloss">Add</button>
  <div id="gloss-toast"></div>
  <hr>
  <div id="gloss-list"></div>
  <hr>
  <button class="btn btn-outline" style="width:100%" id="btn-export-gloss">Export Glossary as TSV</button>
</div>

<!-- Settings -->
<div id="settings" class="panel">
  <h3 id="h-settings">Settings</h3>

  <label style="font-size:12px;color:#5f6368" id="lbl-lang">Language / 言語</label>
  <select id="set-lang" style="margin-bottom:12px">
    <option value="en">English</option>
    <option value="ja">日本語</option>
  </select>

  <label style="font-size:12px;color:#5f6368" id="lbl-src-col">Source Column / 原文列</label>
  <input type="text" id="set-source-col" value="A" maxlength="2">

  <label style="font-size:12px;color:#5f6368" id="lbl-tgt-col">Target Column / 訳文列</label>
  <input type="text" id="set-target-col" value="B" maxlength="2">

  <label style="font-size:12px;color:#5f6368" id="lbl-min-score">Default Min Score / 最低マッチ率</label>
  <select id="set-min-score">
    <option value="0.5">50%</option>
    <option value="0.6">60%</option>
    <option value="0.7">70%</option>
    <option value="0.8">80%</option>
  </select>

  <button class="btn btn-primary" style="margin-top:12px" id="btn-save-settings">Save / 保存</button>
  <div id="settings-toast" style="margin-top:8px"></div>

  <hr>
  <h3 style="color:#ea4335">Danger Zone</h3>
  <button class="btn btn-outline" style="width:100%;margin-bottom:8px;color:#ea4335;border-color:#ea4335" id="btn-clear-tm">Clear TM</button>
  <button class="btn btn-outline" style="width:100%;color:#ea4335;border-color:#ea4335" id="btn-clear-gloss">Clear Glossary</button>
</div>

<script src="felix-engine.js"></script>
<script src="sidepanel.js"></script>
</body>
</html>
